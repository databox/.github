# Central Trivy policy for all Databox repos (SOC 2 Evidence #74 / DCF-784).
# Locked org-wide. Repo-local suppressions live in each repo's .trivyignore.
scan:
  scanners:
    - vuln
    - license
severity:
  - HIGH
  - CRITICAL
# Closed-source services: strong copyleft / SSPL / non-commercial = forbidden (CRITICAL);
# permissive licenses (MIT, Apache-2.0, BSD, ISC, MPL-2.0) are allowed.
license:
  full: true
  forbidden:
    - GPL-2.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0
    - GPL-3.0-only
    - GPL-3.0-or-later
    - AGPL-3.0
    - AGPL-3.0-only
    - AGPL-3.0-or-later
    - LGPL-2.1
    - LGPL-3.0
    - SSPL-1.0
    - CC-BY-NC-4.0
  permissive:
    - MIT
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - MPL-2.0
